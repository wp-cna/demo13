name: Update Events

on:
  schedule:
    # Keep date-based event rollovers fresh shortly after midnight in New York.
    # GitHub cron is UTC, so both entries cover daylight and standard time.
    - cron: "15 4 * * *"
    - cron: "15 5 * * *"
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-events:
    runs-on: ubuntu-latest
    env:
      SITE_BASE_URL: https://wp-cna.github.io
      SITE_PATH_PREFIX: /demo13
      CANONICAL_PATH_PREFIX: /demo13
      ASK_WHITE_PLAINS_API_URL: ${{ vars.ASK_WHITE_PLAINS_API_URL }}
      POSTING_API_URL: ${{ vars.POSTING_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh event data
        run: npm run update-events

      - name: Build site and AI index
        run: npm run build

      - name: Check for event changes
        id: changes
        run: |
          if git diff --quiet -- src/_data/events.auto.json ai/content-index.json worker/src/content-index.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated event feed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/_data/events.auto.json ai/content-index.json worker/src/content-index.js
          git commit -m "Update event feed"
          git push origin HEAD:main

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
