name: Update Agendas

on:
  schedule:
    - cron: "43 10 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-agendas:
    runs-on: ubuntu-latest
    env:
      SITE_BASE_URL: https://wp-cna.github.io
      SITE_PATH_PREFIX: /demo12
      CANONICAL_PATH_PREFIX: /demo12
      ASK_WHITE_PLAINS_API_URL: ${{ vars.ASK_WHITE_PLAINS_API_URL }}
      POSTING_API_URL: ${{ vars.POSTING_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh agenda and minutes data
        run: npm run update-agendas

      - name: Build site and AI index
        run: npm run build

      - name: Check for agenda changes
        id: changes
        run: |
          if git diff --quiet -- src/_data/agendas.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated agenda feed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/_data/agendas.json ai/content-index.json worker/src/content-index.js
          git commit -m "Update meeting agendas"
          git push origin HEAD:main

      - name: Configure Pages
        if: steps.changes.outputs.changed == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
